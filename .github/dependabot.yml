version: 2
updates:
  # GitHub Actions — exceptd-skills uses ci.yml, atlas-currency.yml, and
  # scorecard.yml. Dependabot keeps the pinned-SHA action versions current.
  # v0.12.8: grouped so all actions bumps land as a single PR per week
  # instead of N parallel PRs — every action change goes through the same
  # 10-gate CI matrix, so batching reduces reviewer churn without reducing
  # signal. security-updates kept ungrouped so a CVE in a single action
  # surfaces as its own PR with clear blast radius.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "github-actions"
    groups:
      github-actions-weekly:
        applies-to: "version-updates"
        patterns:
          - "*"

  # npm — exceptd-skills is zero-dependency by design (AGENTS.md / Node stdlib
  # only). Dependabot is still configured to catch any accidental
  # `dependencies` / `devDependencies` regressions, but the open-PR limit is
  # low because there should never be runtime deps to update.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    labels:
      - "deps"
      - "npm"

  # Docker — docker/test.Dockerfile (referenced by `npm run test:docker` +
  # `npm run test:docker:fresh`). Cycle 19 P3 F8: this was outside
  # Dependabot scope so the base image could float without surfacing.
  # Test-only image (no production exposure), but Scorecard's
  # PinnedDependenciesID covers it once a digest pin is present.
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    labels:
      - "deps"
      - "docker"
