name: ATLAS Currency Check

on:
  schedule:
    # Mondays at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  currency:
    name: Run currency report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.0.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run currency report
        id: currency
        run: |
          set +e
          OUTPUT=$(node orchestrator/index.js currency 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo 'report<<CURRENCY_EOF'
            echo "$OUTPUT"
            echo 'CURRENCY_EOF'
          } >> "$GITHUB_OUTPUT"
          # Detect any skill currency under 50% in the report. The currency
          # subcommand is expected to emit lines containing a percentage such
          # as "currency: 42%" or "42% currency" for each skill it checks.
          if echo "$OUTPUT" | grep -E '([0-9]|[1-4][0-9])%' | grep -qiE 'currency|stale|past review'; then
            echo "needs_issue=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_issue=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Open issue for skills past review window
        if: steps.currency.outputs.needs_issue == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const report = `${{ steps.currency.outputs.report }}`;
            const title = '[currency] Skills past review window';
            const body = [
              'The scheduled ATLAS currency check found one or more skills scoring below 50% currency.',
              '',
              'Per AGENTS.md hard rule #12 (external data version pinning) and DR-7 (stale ATLAS version),',
              'review each flagged skill, refresh `last_threat_review`, and audit `atlas_refs` against the',
              'current pinned ATLAS version (v5.1.0).',
              '',
              '## Currency report',
              '',
              '```',
              report,
              '```',
              '',
              `Generated by \`.github/workflows/atlas-currency.yml\` on run ${context.runId}.`,
            ].join('\n');

            // De-dupe: if an open issue with the same title already exists, comment instead.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'currency',
              per_page: 100,
            });
            const match = existing.data.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['currency', 'threat-intel'],
              });
            }
