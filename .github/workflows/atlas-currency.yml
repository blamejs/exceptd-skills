name: ATLAS Currency Check

on:
  schedule:
    # Mondays at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  currency:
    name: Run currency report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.0.0
        with:
          node-version: '24.16.0'
          # No `cache: 'npm'` — the repo has no package-lock.json (zero
          # dependencies), and setup-node v6 hard-fails when caching is
          # requested without a lock file.

      - name: Install dependencies
        # --no-package-lock: the repo intentionally ships no lock file.
        run: npm install --no-package-lock

      - name: Run currency report
        id: currency
        run: |
          set +e
          # Human-readable report for the issue body.
          OUTPUT=$(node orchestrator/index.js currency 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo 'report<<CURRENCY_EOF'
            echo "$OUTPUT"
            echo 'CURRENCY_EOF'
          } >> "$GITHUB_OUTPUT"
          # Gate on the machine-readable `action_required` field from the
          # --json output rather than regex-matching the human-readable
          # prose. `action_required` is true iff at least one skill scores
          # below the currency threshold; it is computed from the actual
          # currency values, so a prose reword can't silently disable this
          # gate. The CLI may print a non-JSON scheduler line before the
          # JSON object, so parse the last `{`-prefixed line.
          JSON_LINE=$(node orchestrator/index.js currency --json 2>/dev/null | grep '^{' | tail -1)
          NEEDS_ISSUE=$(printf '%s' "$JSON_LINE" | node -e "
            let s='';
            process.stdin.on('data', d => s += d);
            process.stdin.on('end', () => {
              try {
                const j = JSON.parse(s);
                process.stdout.write(j.action_required === true ? 'true' : 'false');
              } catch {
                // Fail closed: if the currency report can't be parsed, open
                // an issue so the broken report is surfaced rather than
                // silently swallowed.
                process.stdout.write('true');
              }
            });
          ")
          echo "needs_issue=$NEEDS_ISSUE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Open issue for skills past review window
        if: steps.currency.outputs.needs_issue == 'true'
        # The currency report is untrusted output from `node orchestrator/index.js currency`.
        # A skill author who lands a string containing a backtick + `${...}` could otherwise
        # achieve arbitrary JS execution inside the github-script runtime (CWE-1395 /
        # Scorecard DangerousWorkflowID). We pass the report via `env:` and read it from
        # process.env so it is treated as a plain string, never expanded as a template.
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          REPORT_TEXT: ${{ steps.currency.outputs.report }}
        with:
          script: |
            const report = process.env.REPORT_TEXT || '';
            const atlasPin = JSON.parse(require('fs').readFileSync('data/atlas-ttps.json', 'utf8'))._meta.atlas_version;
            const title = '[currency] Skills past review window';
            const body = [
              'The scheduled ATLAS currency check found one or more skills below the 70% currency review-window threshold (skills below 50% are critical).',
              '',
              'Per AGENTS.md hard rule #12 (external data version pinning) and DR-7 (stale ATLAS version),',
              'review each flagged skill, refresh `last_threat_review`, and audit `atlas_refs` against the',
              `current pinned ATLAS version (${atlasPin}).`,
              '',
              '## Currency report',
              '',
              '```',
              report,
              '```',
              '',
              `Generated by \`.github/workflows/atlas-currency.yml\` on run ${context.runId}.`,
            ].join('\n');

            // De-dupe: if an open issue with the same title already exists, comment instead.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'currency',
              per_page: 100,
            });
            const match = existing.data.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['currency', 'threat-intel'],
              });
            }
