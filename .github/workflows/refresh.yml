name: External Data Refresh

on:
  schedule:
    # Daily 06:00 UTC â€” KEV/EPSS/NVD/GHSA/OSV/advisory feeds churn fast.
    # Scoped to every source EXCEPT the per-RFC drift sweep: that one walks
    # ~9k slow-moving documents against rate-limited upstreams and takes
    # hours, so it runs on the Monday slot only. RFC status drift and
    # new-RFC discovery are weekly signals, not daily ones.
    - cron: '0 6 * * *'
    # Mondays 06:30 UTC â€” full sweep: everything the daily run covers plus
    # the per-RFC drift/discovery pass and version-pin checks (ATLAS,
    # ATT&CK, CWE, D3FEND). Pin checks are report-only; this slot is what
    # opens fresh version-bump issues.
    - cron: '30 6 * * 1'
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply diffs (true) or dry-run only (false)'
        required: false
        default: 'false'
      source:
        description: 'Comma-separated source list (kev,epss,nvd,rfc,pins,ghsa,osv,advisories,cve-regression-watcher) â€” blank = all'
        required: false
        default: ''

# One refresh at a time. A scheduled run that overlaps a still-running
# earlier one would race it on the data-refresh/auto branch; new runs
# queue behind the in-flight one instead.
concurrency:
  group: external-data-refresh
  cancel-in-progress: false

# Top-level minimum-scope default. Per-job blocks below escalate as needed.
permissions:
  contents: read

# v0.13.3: split the prior single `refresh` job into two â€” `refresh-data`
# does the work with NO write credentials, then `open-pr` runs only when
# diffs exist and only has the elevated scopes for the PR / issue creation
# step. Pre-split the long-running data-parse + prefetch + apply steps
# carried contents:write + pull-requests:write + issues:write at once;
# a compromise of any of those steps had repo-write access during the
# entire run. The new shape scopes write capability to the few-second
# PR-creation window.

jobs:
  refresh-data:
    name: Refresh data (no write credentials)
    runs-on: ubuntu-latest
    # No contents:write / pull-requests:write / issues:write here. The
    # downstream open-pr job carries those scopes only at PR-creation time.
    permissions:
      contents: read
    outputs:
      upsert_diffs: ${{ steps.dry.outputs.upsert_diffs }}
      total_diffs: ${{ steps.dry.outputs.total_diffs }}
      pin_diffs: ${{ steps.dry.outputs.pin_diffs }}
      pr_body: ${{ steps.prbody.outputs.body }}

    steps:
      - name: Checkout repository (no persisted credentials)
        # v0.13.3: persist-credentials: false. The downstream `open-pr` job
        # does a fresh checkout with credentials at PR-creation time; this
        # data-refresh job has no write capability against the repo.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.0.0
        with:
          node-version: '24.16.0'
          # No `cache: 'npm'` â€” the repo has no package-lock.json (zero
          # dependencies), and setup-node v6 hard-fails when caching is
          # requested without a lock file.

      - name: Install dependencies
        # --no-package-lock: the repo intentionally ships no lock file, and a
        # generated one would be swept into the data-mutation bundle by the
        # `git status --porcelain` capture below and land in auto-PRs.
        run: npm install --no-package-lock

      - name: Resolve refresh source scope
        id: scope
        # Dispatch input wins. The daily cron scopes to every source except
        # the per-RFC sweep; the Monday cron and blank-source dispatches run
        # the full sweep. Both lists derive from the live source registries
        # (lib/refresh-external.js ALL_SOURCES, lib/prefetch.js SOURCES) so a
        # future source addition is picked up by the daily run automatically
        # rather than silently waiting for the Monday slot.
        env:
          # CWE-78 hardening: route workflow_dispatch input via env: instead
          # of `${{ â€¦ }}` interpolation directly into the bash run: block,
          # and validate against an allowlist shape before it reaches any
          # CLI so an operator who types `kev; rm -rf /; #` cannot break
          # out of the argument.
          SOURCE_INPUT: ${{ inputs.source }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ -n "$SOURCE_INPUT" ]; then
            if ! printf '%s' "$SOURCE_INPUT" | grep -Eq '^[a-z,-]+$'; then
              echo "::error::inputs.source must match ^[a-z,-]+$ (got: $SOURCE_INPUT)"
              exit 1
            fi
            SOURCES="$SOURCE_INPUT"
          elif [ "$EVENT_SCHEDULE" = "0 6 * * *" ]; then
            SOURCES=$(node -e "console.log(Object.keys(require('./lib/refresh-external.js').ALL_SOURCES).filter(s => s !== 'rfc').join(','))")
          else
            SOURCES=""
          fi
          # Prefetch has its own (smaller) source vocabulary â€” intersect so a
          # scoped refresh never asks prefetch for a source it doesn't know.
          PREFETCH_SOURCES=""
          if [ -n "$SOURCES" ]; then
            PREFETCH_SOURCES=$(node -e "const known = new Set(Object.keys(require('./lib/prefetch.js').SOURCES)); console.log(process.argv[1].split(',').filter(s => known.has(s)).join(','))" "$SOURCES")
          fi
          echo "sources=$SOURCES" >> "$GITHUB_OUTPUT"
          echo "prefetch_sources=$PREFETCH_SOURCES" >> "$GITHUB_OUTPUT"
          echo "refresh scope: ${SOURCES:-<all>} | prefetch scope: ${PREFETCH_SOURCES:-<all>}"

      - name: Warm upstream cache (single fan-out fetch)
        # Prefetch caches the in-scope upstream snapshots once at job start.
        # The subsequent refresh runs read from .cache/upstream rather than
        # re-hitting upstream APIs â€” eliminates parallel-fetch rate-limit
        # contention and gives swarm-mode genuine parallelism. The scope
        # comes from the resolve step above: an unscoped prefetch on a scoped
        # run wastes hours warming ~9k per-RFC entries the refresh never
        # reads.
        #
        # --max-errors 50: the cache warm fans out hundreds (daily) to ~9.7k
        # (Monday) per-CVE/per-RFC fetches against rate-limited public APIs,
        # so a few transient per-entry errors (counted only after the job
        # queue exhausts its retries) are expected and must not fail the whole
        # refresh â€” the downstream dry-run reads whatever landed and treats a
        # miss as a non-fatal "missing entry". A larger error count signals a
        # systemic upstream outage and still fails the step, as does any single
        # feed that returns nothing at all (so a dead KEV feed can't be silently
        # skipped). The per-source error breakdown lands in the prefetch summary
        # so a recurring dead source is visible in the log.
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_INPUT: ${{ steps.scope.outputs.prefetch_sources }}
        run: |
          SOURCE_ARG=""
          if [ -n "$SOURCE_INPUT" ]; then
            SOURCE_ARG="--source $SOURCE_INPUT"
          fi
          node lib/prefetch.js --quiet --max-errors 50 $SOURCE_ARG

      - name: Run refresh in dry-run mode (always first)
        id: dry
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          # Resolved + allowlist-validated by the scope step above (dispatch
          # input never reaches this step unvalidated). The shape check here
          # is defense in depth.
          SOURCE_INPUT: ${{ steps.scope.outputs.sources }}
        run: |
          set +e
          SOURCE_ARG=""
          if [ -n "$SOURCE_INPUT" ]; then
            if ! printf '%s' "$SOURCE_INPUT" | grep -Eq '^[a-z,-]+$'; then
              echo "::error::source scope must match ^[a-z,-]+$ (got: $SOURCE_INPUT)"
              exit 1
            fi
            SOURCE_ARG="--source $SOURCE_INPUT"
          fi
          # --from-cache + --swarm: source fetches run in parallel against
          # the warm cache, never touching upstream a second time.
          # --force-stale: the cache was prefetched seconds ago in THIS job by
          # a runner that (correctly) has no signing key, so the Ed25519 cache
          # signature can never exist here. The signature guards a cache that
          # crosses a trust boundary; this one never leaves the ephemeral
          # runner, and everything applied from it reaches main only through
          # the auto-PR with full CI + review.
          node lib/refresh-external.js --from-cache .cache/upstream --swarm --force-stale $SOURCE_ARG 2>&1 | tee refresh-dry.log
          DRY_EXIT=${PIPESTATUS[0]}
          echo "exit_code=$DRY_EXIT" >> "$GITHUB_OUTPUT"
          # Count diffs across all sources to drive PR-open decision.
          TOTAL_DIFFS=$(node -e "const r=require('./refresh-report.json'); let n=0; for (const s of Object.values(r.sources||{})) n+=s.diff_count||0; console.log(n)")
          PIN_DIFFS=$(node -e "const r=require('./refresh-report.json'); const p=r.sources?.pins; console.log(p?.diff_count||0)")
          # Apply-mode diffs are everything that's NOT report_only.
          UPSERT_DIFFS=$(node -e "const r=require('./refresh-report.json'); let n=0; for (const s of Object.values(r.sources||{})) if (!s.report_only) n+=s.diff_count||0; console.log(n)")
          echo "total_diffs=$TOTAL_DIFFS" >> "$GITHUB_OUTPUT"
          echo "pin_diffs=$PIN_DIFFS" >> "$GITHUB_OUTPUT"
          echo "upsert_diffs=$UPSERT_DIFFS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Apply upserts (only if requested OR scheduled with diffs)
        if: |
          steps.dry.outputs.upsert_diffs != '0' &&
          (github.event_name == 'schedule' || inputs.apply == 'true')
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          # Resolved + allowlist-validated by the scope step above; shape
          # check kept as defense in depth.
          SOURCE_INPUT: ${{ steps.scope.outputs.sources }}
        run: |
          SOURCE_ARG=""
          if [ -n "$SOURCE_INPUT" ]; then
            if ! printf '%s' "$SOURCE_INPUT" | grep -Eq '^[a-z,-]+$'; then
              echo "::error::source scope must match ^[a-z,-]+$ (got: $SOURCE_INPUT)"
              exit 1
            fi
            SOURCE_ARG="--source $SOURCE_INPUT"
          fi
          # Apply from the same warm cache. --apply triggers an automatic
          # build-indexes rebuild after writing upserts. --force-stale for the
          # same reason as the dry-run step: the same-job cache is unsigned by
          # design on a keyless runner, and the apply only ever lands on main
          # via the auto-PR.
          node lib/refresh-external.js --apply --from-cache .cache/upstream --swarm --force-stale $SOURCE_ARG

      - name: Sync package.json description counts to the applied data
        if: |
          steps.dry.outputs.upsert_diffs != '0' &&
          (github.event_name == 'schedule' || inputs.apply == 'true')
        # package.json.description embeds entry counts (N CVEs / N skills / N
        # catalogs / N jurisdictions / ...) that refresh-sbom copies into
        # sbom.cdx.json and the SBOM-currency gate validates token-by-token. An
        # apply that changes a count must update the description FIRST (before
        # the SBOM regen below), or the description-token gate fails the auto-PR.
        run: node scripts/sync-package-description.js

      - name: Refresh SBOM over the applied data
        if: |
          steps.dry.outputs.upsert_diffs != '0' &&
          (github.event_name == 'schedule' || inputs.apply == 'true')
        # sbom.cdx.json records content hashes for the data catalogs the apply
        # just rewrote; without regenerating it the predeploy gate's SBOM
        # currency test fails on hash drift, and the auto-PR would ship data
        # the SBOM no longer describes. The regenerated SBOM is swept into the
        # same data-mutation bundle as the files it hashes.
        run: npm run refresh-sbom

      - name: Validation gate (the apply produced a structurally sound tree)
        if: |
          steps.dry.outputs.upsert_diffs != '0' &&
          (github.event_name == 'schedule' || inputs.apply == 'true')
        run: |
          # Targeted validation, deliberately NOT the full test suite. The
          # suite enforces curation-completeness (zero drafts, ai_discovered
          # on every entry, pinned curated values) â€” guarantees a human
          # supplies during curation, which auto-imported entries do not yet
          # have by design ("auto-imported â€” needs human curation" is this
          # pipeline's own PR framing). Running it here meant the auto-PR
          # could never open once real drift arrived. Structural soundness is
          # what auto-applied data must prove: schema-valid catalog entries,
          # coherent RWEP sums, resolvable cross-refs, fresh indexes, clean
          # skills. The full suite still gates the auto-PR's merge via the
          # repo's required CI checks.
          node lib/lint-skills.js
          node lib/validate-indexes.js
          node lib/validate-cve-catalog.js --strict
          node lib/validate-playbooks.js

      - name: Build PR body with new-entries / updates split
        id: prbody
        if: |
          steps.dry.outputs.upsert_diffs != '0' &&
          (github.event_name == 'schedule' || inputs.apply == 'true')
        run: |
          node -e "
            const r = require('./refresh-report.json');
            const sources = r.sources || {};
            let newEntries = [];
            let updates = [];
            for (const [name, src] of Object.entries(sources)) {
              for (const d of src.diffs || []) {
                if (d.op === 'add') newEntries.push({ source: name, ...d });
                else if (!src.report_only) updates.push({ source: name, ...d });
              }
            }
            let body = '## Automated external-data refresh\n\n';
            if (newEntries.length) {
              body += '### New entries (auto-imported â€” needs human curation)\n\n';
              body += '| Source | ID | Note |\n|---|---|---|\n';
              for (const e of newEntries) {
                const note = e.meta ? Object.values(e.meta).filter(Boolean).join(' Â· ') : '';
                body += '| ' + e.source + ' | \`' + e.id + '\` | ' + note + ' |\n';
              }
              body += '\nEach carries an \`_auto_imported\` block with required analytical fields nulled. Curate \`framework_control_gaps\`, \`atlas_refs\`, \`attack_refs\`, \`type\`, and \`poc_*\` before merge or in a follow-up.\n\n';
            }
            if (updates.length) {
              body += '### Updates to existing entries (' + updates.length + ')\n\n';
              body += '| Source | ID | Field | Before â†’ After |\n|---|---|---|---|\n';
              for (const u of updates.slice(0, 30)) {
                body += '| ' + u.source + ' | \`' + u.id + '\` | ' + u.field + ' | ' + JSON.stringify(u.before) + ' â†’ ' + JSON.stringify(u.after) + ' |\n';
              }
              if (updates.length > 30) body += '\n_(+' + (updates.length - 30) + ' more â€” see refresh-report.json artifact)_\n';
              body += '\n';
            }
            body += '### Gate status\n\n- [x] \`lint-skills\`\n- [x] \`validate-indexes\`\n- [x] \`validate-cve-catalog --strict\`\n- [x] \`validate-playbooks\`\n\nStructural validators only â€” the full \`tests/*.test.js\` suite gates the **merge** via required CI checks, not this PR\x27s creation (its curation-completeness checks cannot pass on the uncurated drafts this import produces).\n\n';
            body += 'Each upsert bumped \`last_verified\` to today and rebuilt \`data/_indexes/\`.\n\n';
            body += '> đź¤– Auto-generated. Human review required before merge.\n';
            require('fs').writeFileSync('/tmp/pr-body.md', body);
          "
          {
            echo 'body<<PRBODY_EOF'
            cat /tmp/pr-body.md
            echo 'PRBODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Bundle mutated data tree as artifact (for open-pr job)
        if: |
          steps.dry.outputs.upsert_diffs != '0' &&
          (github.event_name == 'schedule' || inputs.apply == 'true')
        # The downstream open-pr job does a fresh checkout against main +
        # overlays this bundle to reproduce the apply step's mutations
        # without re-running the apply. The bundle covers data/ +
        # manifest.json + any other file refresh --apply may touch.
        run: |
          mkdir -p /tmp/refresh-bundle
          # Capture every modified or new tracked file under data/ +
          # the manifest. Use git's view (works because we own the
          # checkout's working tree even though no creds are persisted).
          git -c safe.directory='*' status --porcelain | awk '{print $2}' > /tmp/refresh-bundle/files.txt
          if [ -s /tmp/refresh-bundle/files.txt ]; then
            tar -czf /tmp/refresh-bundle/changes.tar.gz -T /tmp/refresh-bundle/files.txt
          else
            # Defensive: even with upsert_diffs > 0, if nothing landed
            # on disk (e.g. apply was a no-op due to lock contention)
            # surface an empty archive marker so open-pr can short-circuit.
            : > /tmp/refresh-bundle/empty.marker
          fi

      - name: Upload data-mutation bundle for open-pr
        if: |
          steps.dry.outputs.upsert_diffs != '0' &&
          (github.event_name == 'schedule' || inputs.apply == 'true')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: refresh-bundle-${{ github.run_id }}
          path: /tmp/refresh-bundle/
          if-no-files-found: ignore
          retention-days: 1

      - name: Upload refresh-report.json artifact (always â€” for operator debug)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: refresh-report-${{ github.run_id }}
          path: refresh-report.json
          if-no-files-found: ignore
          retention-days: 30

  open-pr:
    name: Open auto-PR + version-pin issue (write credentials scoped here)
    runs-on: ubuntu-latest
    needs: refresh-data
    # Only run when the upstream refresh produced applied diffs OR a
    # version-pin drift was detected. Skips entirely when there's
    # nothing to push.
    if: |
      needs.refresh-data.outputs.upsert_diffs != '0' ||
      needs.refresh-data.outputs.pin_diffs != '0'
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository (credentials persisted only here)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Download refresh-data bundle
        if: needs.refresh-data.outputs.upsert_diffs != '0'
        # download-artifact v8 reads artifacts written by upload-artifact v7
        # above â€” both use the v4+ artifact backend, so the cross-major
        # upload(v7)/download(v8) round-trip is compatible.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: refresh-bundle-${{ github.run_id }}
          path: /tmp/refresh-bundle

      - name: Download refresh-report.json
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: refresh-report-${{ github.run_id }}
          path: .

      - name: Apply data mutations from the refresh-data bundle
        if: needs.refresh-data.outputs.upsert_diffs != '0'
        run: |
          if [ -f /tmp/refresh-bundle/changes.tar.gz ]; then
            tar -xzf /tmp/refresh-bundle/changes.tar.gz
            echo "Applied data mutations:"
            git status --porcelain
          else
            echo "::warning::refresh-bundle marker but no changes.tar.gz â€” refresh-data produced no on-disk mutations despite upsert_diffs != 0."
          fi

      - name: Mint a scoped GitHub App token for PR creation
        id: app-token
        if: needs.refresh-data.outputs.upsert_diffs != '0'
        # GITHUB_TOKEN is barred from creating pull requests under this repo's
        # policy, and a GITHUB_TOKEN-authored PR would not trigger the required
        # CI checks (GitHub's recursion guard) â€” so such a PR could never
        # satisfy branch protection to merge. A GitHub App installation token
        # does both: it opens the PR, and the PR it opens runs ci.yml. The
        # token is minted per-run, scoped to this repo, and expires with the job.
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ secrets.REFRESH_APP_CLIENT_ID }}
          private-key: ${{ secrets.REFRESH_APP_PRIVATE_KEY }}
          # Request only the scopes the PR step needs, rather than inheriting
          # everything the installation grants. The minted token stays
          # least-privilege even if the App's permissions are widened later.
          permission-contents: write
          permission-pull-requests: write

      - name: Open auto-PR with applied diffs
        if: needs.refresh-data.outputs.upsert_diffs != '0'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: data-refresh/auto
          title: "data-refresh: ${{ github.run_id }}"
          commit-message: |
            data-refresh: KEV/EPSS/NVD/RFC upsert + auto-discovery

            Auto-generated by .github/workflows/refresh.yml run ${{ github.run_id }}.
            See refresh-report.json artifact for the per-source diff breakdown.
          body: ${{ needs.refresh-data.outputs.pr_body }}
          labels: |
            data-refresh
            automation
            needs-curation

      - name: Open issue for version-pin drift
        if: needs.refresh-data.outputs.pin_diffs != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('refresh-report.json', 'utf8'));
            const pinDiffs = report.sources?.pins?.diffs || [];
            if (pinDiffs.length === 0) return;

            const rows = pinDiffs.map(d =>
              `| \`${d.id}\` | ${d.before || '?'} | ${d.after || '?'} | [release](${d.source_url || '#'}) | ${d.local_path_hint || ''} |`
            ).join('\n');

            const title = `[pin] Upstream version bump available â€” ${pinDiffs.map(d => d.id).join(', ')}`;
            const body = [
              'The scheduled refresh job detected an upstream version bump on one or more pinned catalogs.',
              '',
              'Per AGENTS.md Hard Rule #12 (external data version pinning), these bumps are NOT auto-applied.',
              'A pin update requires an audit pass over the affected skills/catalogs.',
              '',
              '## Pending pin bumps',
              '',
              '| Pin | Current | Latest | Source | Update target |',
              '|---|---|---|---|---|',
              rows,
              '',
              '## Audit checklist',
              '',
              '- [ ] Read the upstream changelog at the release link for each pin',
              '- [ ] Inventory affected skills (grep for `atlas_refs` / `attack_refs` / `cwe_refs` / `d3fend_refs`)',
              '- [ ] Update `manifest.json` (`atlas_version`, `attack_version`) or catalog `_meta.version`',
              '- [ ] Update `data/atlas-ttps.json` / `data/cwe-catalog.json` / `data/d3fend-catalog.json` entries if the upstream renamed/removed any cited id',
              '- [ ] Bump `last_threat_review` on affected skills',
              '- [ ] Run `npm run build-indexes` then `npm run predeploy`',
              '',
              `Run: <https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}>`,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'version-pin',
              per_page: 100,
            });
            const match = existing.data.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['version-pin', 'automation'],
              });
            }
