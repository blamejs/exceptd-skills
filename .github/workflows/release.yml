name: Release

# Tag-triggered npm publish with provenance attestation + GitHub Release
# creation. Validates the full predeploy gate sequence first so a bad
# release can't be published.
#
# Trigger: push a tag matching v*.*.* (e.g. v0.9.0).
#
# Required secrets:
#   NPM_TOKEN — npm automation token with publish rights on
#               @blamejs scope. Set in repo Settings → Secrets and
#               variables → Actions. Use a granular token scoped to
#               the published package only.
#
# Provenance: this workflow uses GitHub's OIDC identity to sign the
# published tarball via npm provenance. Requires `id-token: write`
# permission on the publish job and `--provenance` on `npm publish`
# (handled by publishConfig.provenance: true in package.json).
#
# Job split (v0.12.7): `validate` runs every trigger including
# branch-based workflow_dispatch dry-runs; `publish` is gated by the
# `npm-publish` deployment environment (tag-only protection) AND by
# `needs: validate`. GitHub evaluates environment rules BEFORE the
# job is scheduled — placing the environment on the entire release
# job (the v0.12.6 shape) blocked every branch-based workflow_dispatch
# at scheduling time, defeating dry-runs.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.9.0). Must already exist.'
        required: true
        default: ''
      dry_run:
        description: 'If true, run predeploy + npm pack but skip npm publish.'
        required: false
        default: 'false'

# HH P1-1: Scorecard TokenPermissionsID — declare the workflow-level default
# at the minimum scope (`contents: read`). Per-job blocks below retain the
# elevated scopes (publish needs `contents: write` + `id-token: write`).
# Without this top-level declaration the GITHUB_TOKEN inherits the repository
# default, which Scorecard flags as an unscoped write-capable token even on
# read-only jobs.
permissions:
  contents: read

jobs:
  validate:
    name: Validate (gates + e2e + npm pack preview)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version_check.outputs.version }}
      tag: ${{ steps.version_check.outputs.tag }}

    steps:
      - name: Checkout (full history for changelog extraction)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Node 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          # Pin the exact patch ci.yml and docker/test.Dockerfile pin so the
          # gates here and the published-artifact build run the same Node a
          # Node-minor-sensitive regression would expose. tests/docker.test.js
          # asserts these three stay in lockstep.
          node-version: '24.16.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        id: version_check
        # v0.12.39: route inputs.tag via env to prevent shell injection.
        # A workflow_dispatch caller could otherwise pass `tag` containing
        # shell metacharacters and achieve script injection on the runner
        # (CWE-94 / CWE-78). Env indirection + regex allowlist on the
        # canonical tag shape v<semver> closes the sink.
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          # Validate inputs.tag against canonical v<semver>(-<prerelease>)? shape
          # BEFORE using it. Reject anything else. GITHUB_REF_NAME on a tag-push
          # trigger is already shaped by the v* tag ruleset (server-side
          # enforced), so this validation only matters when INPUT_TAG is the
          # source — i.e. workflow_dispatch.
          if [ -n "$INPUT_TAG" ]; then
            if ! echo "$INPUT_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
              echo "::error::inputs.tag '$INPUT_TAG' does not match ^v[0-9]+\\.[0-9]+\\.[0-9]+(-[A-Za-z0-9.]+)?$"
              exit 1
            fi
          fi
          TAG="${GITHUB_REF_NAME:-$INPUT_TAG}"
          # Strip leading 'v' from the tag for comparison.
          TAG_VERSION="${TAG#v}"
          echo "package.json version: $PKG_VERSION"
          echo "tag (stripped):       $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install dependencies (none — sanity check zero-dep claim)
        run: |
          set -e
          npm install --no-audit --no-fund
          DEP_COUNT="$(node -p "Object.keys(require('./package.json').dependencies || {}).length")"
          DEV_COUNT="$(node -p "Object.keys(require('./package.json').devDependencies || {}).length")"
          echo "dependencies: $DEP_COUNT, devDependencies: $DEV_COUNT"
          if [ "$DEP_COUNT" != "0" ] || [ "$DEV_COUNT" != "0" ]; then
            echo "::error::package.json declares dependencies — release flow expects zero"
            exit 1
          fi

      - name: Bootstrap (verify-only path)
        run: npm run bootstrap

      - name: Predeploy gate sequence
        # Runs the full publish-gate sequence. The authoritative gate list +
        # ordering lives in scripts/predeploy.js (the GATES array) — read it
        # there rather than maintaining a duplicate enumeration here that
        # drifts as gates are added or removed.
        run: npm run predeploy

      - name: End-to-end scenarios (staged-IoC harness)
        # v0.12.2: iterate tests/e2e-scenarios/* — each scenario stages
        # a synthetic file tree (CVE-2026-45321 payload files, Claude
        # SessionStart hooks, VS Code folder-open tasks, GitHub Actions
        # cache co-residency, missing .npmrc cooldown, etc.) and asserts
        # the CLI catches it. Unit tests prove the engine works in
        # isolation; this proves the seven-phase contract catches real
        # IoCs against a real filesystem.
        run: npm run test:e2e

      - name: Forensic — working-tree drift since checkout
        # If any predeploy gate / test mutated tracked files, dump the
        # exact files that differ from checkout. Runs even on failure.
        if: always()
        run: |
          echo '== git status --porcelain =='
          git status --porcelain || true
          echo '== git diff --stat HEAD =='
          git diff --stat HEAD || true

      - name: Assert prepublishOnly delegates only to predeploy + validate-package
        # The publish job below sets EXCEPTD_SKIP_PREPUBLISH_PREDEPLOY=1 to
        # avoid double-running the predeploy gate (validate ran it above).
        # That escape hatch is only safe as long as `prepublishOnly`'s
        # work is exactly { predeploy, validate-package } and nothing more.
        # If anyone adds a NEW gate to prepublishOnly (e.g. a third script
        # invocation), it would be silently skipped on the canonical
        # release path. This step parses package.json and fails the build
        # if the shape changes — forcing a human to either fold the new
        # gate into predeploy/validate-package or update this assertion
        # AND the publish step deliberately.
        run: |
          node -e "
            const pkg = require('./package.json');
            const pre = pkg.scripts && pkg.scripts.prepublishOnly;
            if (!pre) { console.error('prepublishOnly is unset'); process.exit(1); }
            // Allowed references — and nothing else.
            const allow = ['scripts/predeploy.js', 'lib/validate-package.js', 'EXCEPTD_SKIP_PREPUBLISH_PREDEPLOY'];
            const forbidden = ['scripts/', 'lib/'].flatMap(prefix =>
              (pre.match(new RegExp(prefix + '[a-zA-Z0-9_./-]+', 'g')) || [])
            );
            for (const tok of forbidden) {
              if (!allow.includes(tok)) {
                console.error('prepublishOnly references unexpected gate: ' + tok);
                console.error('Either fold the new gate into predeploy / validate-package, or update the assertion + the EXCEPTD_SKIP_PREPUBLISH_PREDEPLOY escape hatch in .github/workflows/release.yml.');
                process.exit(1);
              }
            }
            console.log('prepublishOnly shape OK — only predeploy + validate-package referenced.');
          "

      - name: npm pack (dry-run preview)
        run: |
          npm pack --dry-run --json | tee /tmp/pack.json
          PACKED_SIZE="$(node -e 'const j=require("/tmp/pack.json"); console.log(Array.isArray(j)?j[0].size:j.size)')"
          UNPACKED_SIZE="$(node -e 'const j=require("/tmp/pack.json"); console.log(Array.isArray(j)?j[0].unpackedSize:j.unpackedSize)')"
          FILE_COUNT="$(node -e 'const j=require("/tmp/pack.json"); console.log(Array.isArray(j)?j[0].files.length:j.files.length)')"
          echo "Tarball: $PACKED_SIZE bytes packed / $UNPACKED_SIZE bytes unpacked / $FILE_COUNT files"

  # v0.13.2: split the original single `publish` job into two —
  # `publish-npm` (id-token:write only) and `publish-github-release`
  # (contents:write only). Pre-split the job carried BOTH permissions
  # at once; a compromise of any step in the job (leaked NODE_AUTH_TOKEN,
  # malicious dependency in the runner image, third-party action with
  # elevated trust) had access to BOTH the npm provenance signing
  # identity AND repo-write at the same time. Splitting scopes each
  # permission to the minimum surface that needs it.
  publish-npm:
    name: Publish to npm (id-token:write isolated)
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ github.event_name == 'push' || inputs.dry_run != 'true' }}
    # Deployment-environment gate: `npm-publish` is restricted to tag refs
    # matching `v*.*.*` (configured in repo Settings → Environments).
    # Branch-based workflow_dispatch cannot reach this job. The dispatched
    # dry-run path skips this job entirely via the `if:` above.
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@blamejs/exceptd-skills
    permissions:
      # id-token:write ONLY. No contents:write. The npm provenance
      # signing identity cannot also write to the repo from this job.
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Node 24 + npm provenance support
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          # Same exact patch as ci.yml / docker/test.Dockerfile — the publish
          # path must not build the tarball on a different Node than the gates
          # verified against.
          node-version: '24.16.0'
          registry-url: 'https://registry.npmjs.org'
          # `always-auth: true` makes the published .npmrc authenticate
          # against NPM_TOKEN — required because we don't `npm install`
          # any deps but we DO need a writable auth token at publish time.
          always-auth: true

      - name: Install dependencies (none — sanity check zero-dep claim)
        run: npm install --no-audit --no-fund

      - name: Bootstrap (verify-only path) — needed for prepublishOnly hooks
        run: npm run bootstrap

      - name: npm publish (with provenance)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # v0.11.7: skip prepublishOnly's redundant predeploy run. The
          # `validate` job above already ran the same gates. Re-running
          # here caused a spurious public-key fingerprint divergence in
          # CI (different fingerprint reported on the second invocation,
          # signature verification failing despite bit-identical inputs).
          # The validate job is the authoritative safety net for CI
          # publishes.
          #
          # IMPORTANT — escape hatch invariant: this only skips the
          # `node scripts/predeploy.js` half of prepublishOnly. The
          # second half (`node lib/validate-package.js`) still runs.
          # The validate-job step "Assert prepublishOnly delegates only
          # to predeploy + validate-package" guards this assumption —
          # if anyone adds a third gate to prepublishOnly, the release
          # fails at validate-time rather than silently skipping it on
          # the canonical tag-push path.
          EXCEPTD_SKIP_PREPUBLISH_PREDEPLOY: '1'
        run: |
          # --access public is also set via publishConfig, but explicit beats
          # implicit on the release path.
          # --provenance asks npm to publish a signed attestation tying
          # this tarball to this GitHub workflow run.
          npm publish --access public --provenance

  publish-github-release:
    name: Create GitHub Release (App-token, no workflow write)
    runs-on: ubuntu-latest
    # Sequenced after publish-npm so the GitHub Release only fires when
    # npm publish succeeded. Releases pointing at a tag whose npm publish
    # failed are operator-confusing — "v0.13.2 is on GitHub Releases but
    # `npm install @blamejs/exceptd-skills@0.13.2` fails" is a worse
    # state than "the tag is out there but no release page exists yet."
    needs: [validate, publish-npm]
    if: ${{ github.event_name == 'push' || inputs.dry_run != 'true' }}
    permissions:
      # No workflow-level write. The GitHub Release is created with a scoped,
      # per-run GitHub App installation token (minted below) that carries
      # contents:write at the App level, so the workflow's GITHUB_TOKEN stays
      # read-only — closing the Scorecard Token-Permissions finding while the
      # release-creation capability is unchanged. Still no id-token:write, so
      # this job cannot sign an npm provenance attestation.
      contents: read

    steps:
      - name: Checkout (for CHANGELOG extraction only)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.tag || github.ref }}

      - name: Extract CHANGELOG section for this version
        id: changelog
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          # Pull the section between "## <version>" and the next "## ".
          # awk handles multiline + preserves formatting.
          awk -v v="$VERSION" '
            $0 ~ "^## " v " " { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            # v0.12.41: surface the fallback as a workflow warning so
            # the run page makes the parse-failure visible to operators
            # rather than silently shipping a generic body.
            echo "::warning::CHANGELOG extraction returned empty for v$VERSION; falling back to generic body. Check CHANGELOG.md for a '## $VERSION ' heading."
            echo "Release of v$VERSION." > /tmp/release-notes.md
          fi
          {
            echo 'body<<RELEASE_NOTES_EOF'
            cat /tmp/release-notes.md
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Mint a scoped GitHub App token for the release
        id: app-token
        # Same App (exceptd-refresh-bot) refresh.yml uses for PR creation. The
        # minted token is per-run, repo-scoped, expires with the job, and carries
        # ONLY contents:write — so the workflow grants no write and the Scorecard
        # Token-Permissions finding clears, with the release capability unchanged.
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ secrets.REFRESH_APP_CLIENT_ID }}
          private-key: ${{ secrets.REFRESH_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: ${{ needs.validate.outputs.tag }}
          name: ${{ needs.validate.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          generate_release_notes: false
