<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80" viewBox="0 0 320 80" role="img">
  <title>exceptd security</title>
  <desc>exceptd security logo — exception bracket mark with wordmark</desc>

  <!-- Icon: exception bracket mark -->
  <!-- outer left bracket -->
  <polyline points="28,12 10,12 10,68 28,68" fill="none" stroke="#0d0d0d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- inner right bracket -->
  <polyline points="44,26 62,26 62,54 44,54" fill="none" stroke="#0d0d0d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- red accent dot -->
  <circle cx="36" cy="40" r="7" fill="#cc2200"/>

  <!-- Wordmark -->
  <text x="80" y="48" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" letter-spacing="-1.5" fill="#0d0d0d">except<tspan fill="#cc2200">d</tspan></text>

  <!-- Tagline -->
  <text x="82" y="66" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="10" letter-spacing="4" fill="#0d0d0d" opacity="0.35">SECURITY</text>
</svg>
